services:
  postgres:
    image: postgres:15
    container_name: omeia-postgres
    environment:
      POSTGRES_USER: farkki
      POSTGRES_PASSWORD: farkki_dev_password
      POSTGRES_DB: farkki_ai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - omeia-pg-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: omeia-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - omeia-qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  omeia-pg-data:
  omeia-qdrant-data:
