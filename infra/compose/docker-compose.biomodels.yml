# Biomedical AI model FastAPI services — run on Linux workstation.
#
# Already in main docker-compose.yml (SKIP): postgres, qdrant, ollama
#
# Light stack (embeddings + gateway — CPU):
#   docker compose -f docker-compose.yml -f docker-compose.biomodels.yml --profile biomodels up -d
#
# + LLMs (GPU recommended):
#   docker compose -f docker-compose.yml -f docker-compose.biomodels.yml --profile biomodels --profile biomodels-llm up -d
#
# + Single-cell foundation models:
#   docker compose -f docker-compose.yml -f docker-compose.biomodels.yml --profile biomodels-singlecell up -d
#
# Full:
#   docker compose -f docker-compose.yml -f docker-compose.biomodels.yml --profile biomodels --profile biomodels-llm --profile biomodels-singlecell up -d

# Merge with docker-compose.yml so services share omeia-internal network:
#   docker compose -f docker-compose.yml -f docker-compose.biomodels.yml ...

volumes:
  omeia-hf-cache:

x-biomodel-env: &biomodel-env
  HF_HOME: /models/hf-cache
  BIOMODEL_LAZY_LOAD: ${BIOMODEL_LAZY_LOAD:-true}
  TRANSFORMERS_CACHE: /models/hf-cache
  HF_TOKEN: ${HF_TOKEN:-}

x-biomodel-vols: &biomodel-vols
  - omeia-hf-cache:/models/hf-cache

services:
  biomedical-gateway:
    profiles: [biomodels]
    build:
      context: .
      dockerfile: docker/biomedical-models/Dockerfile.cpu
      args:
        SERVICE_DIR: gateway
    image: omeia-biomedical-gateway:latest
    container_name: omeia-biomedical-gateway
    networks: [omeia-internal]
    ports:
      - "${BIOMED_GATEWAY_BIND:-127.0.0.1}:8100:8100"
    environment:
      <<: *biomodel-env
      BIOMED_EMBEDDINGS_URL: http://biomedical-embeddings:8101
      BIOMED_BIOGPT_URL: http://biomedical-biogpt:8102
      BIOMED_TXGEMMA_URL: http://biomedical-txgemma:8103
      BIOMED_GENEFORMER_URL: http://biomedical-geneformer:8110
      BIOMED_SCGPT_URL: http://biomedical-scgpt:8111
      BIOMED_SCPRINT_URL: http://biomedical-scprint:8112
    volumes: *biomodel-vols
    depends_on:
      biomedical-embeddings:
        condition: service_started
    restart: unless-stopped

  biomedical-embeddings:
    profiles: [biomodels]
    build:
      context: .
      dockerfile: docker/biomedical-models/Dockerfile.cpu
      args:
        SERVICE_DIR: embeddings
    image: omeia-biomedical-embeddings:latest
    container_name: omeia-biomedical-embeddings
    networks: [omeia-internal]
    ports:
      - "127.0.0.1:8101:8101"
    environment:
      <<: *biomodel-env
      BIOMODEL_PRELOAD: ${BIOMODEL_PRELOAD_EMBEDDINGS:-false}
      BIOMODEL_PRELOAD_MODELS: medcpt-query
    volumes: *biomodel-vols
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8101"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G

  biomedical-biogpt:
    profiles: [biomodels-llm]
    build:
      context: .
      dockerfile: docker/biomedical-models/Dockerfile.gpu
      args:
        SERVICE_DIR: biogpt
    image: omeia-biomedical-biogpt:latest
    container_name: omeia-biomedical-biogpt
    networks: [omeia-internal]
    ports:
      - "127.0.0.1:8102:8102"
    environment: *biomodel-env
    volumes: *biomodel-vols
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8102"]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  biomedical-txgemma:
    profiles: [biomodels-llm]
    build:
      context: .
      dockerfile: docker/biomedical-models/Dockerfile.gpu
      args:
        SERVICE_DIR: txgemma
    image: omeia-biomedical-txgemma:latest
    container_name: omeia-biomedical-txgemma
    networks: [omeia-internal]
    ports:
      - "127.0.0.1:8103:8103"
    environment: *biomodel-env
    volumes: *biomodel-vols
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8103"]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  biomedical-geneformer:
    profiles: [biomodels-singlecell]
    build:
      context: .
      dockerfile: docker/biomedical-models/Dockerfile.singlecell
    image: omeia-biomedical-geneformer:latest
    container_name: omeia-biomedical-geneformer
    networks: [omeia-internal]
    ports:
      - "127.0.0.1:8110:8110"
    environment:
      <<: *biomodel-env
      SINGLECELL_SERVICE_NAME: geneformer
      SINGLECELL_HF_ID: ctheodoris/Geneformer
      SINGLECELL_MODEL_KEY: geneformer
    volumes: *biomodel-vols
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8110"]
    restart: unless-stopped

  biomedical-scgpt:
    profiles: [biomodels-singlecell]
    build:
      context: .
      dockerfile: docker/biomedical-models/Dockerfile.singlecell
    image: omeia-biomedical-scgpt:latest
    container_name: omeia-biomedical-scgpt
    networks: [omeia-internal]
    ports:
      - "127.0.0.1:8111:8111"
    environment:
      <<: *biomodel-env
      SINGLECELL_SERVICE_NAME: scgpt
      SINGLECELL_HF_ID: bowang-lab/scGPT-human
      SINGLECELL_MODEL_KEY: scgpt-human
    volumes: *biomodel-vols
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8111"]
    restart: unless-stopped

  biomedical-scprint:
    profiles: [biomodels-singlecell]
    build:
      context: .
      dockerfile: docker/biomedical-models/Dockerfile.singlecell
    image: omeia-biomedical-scprint:latest
    container_name: omeia-biomedical-scprint
    networks: [omeia-internal]
    ports:
      - "127.0.0.1:8112:8112"
    environment:
      <<: *biomodel-env
      SINGLECELL_SERVICE_NAME: scprint
      SINGLECELL_HF_ID: jkobject/scPRINT
      SINGLECELL_MODEL_KEY: scprint
    volumes: *biomodel-vols
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8112"]
    restart: unless-stopped
