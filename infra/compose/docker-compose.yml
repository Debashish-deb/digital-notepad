# OMEIA local stack — run from repo root: docker compose up -d (via root symlink)
# Generate token: infra/scripts/llm/generate_ollama_token.sh

networks:
  omeia-internal:
    driver: bridge

services:
  postgres:
    image: postgres:15
    container_name: omeia-postgres
    networks: [omeia-internal]
    environment:
      POSTGRES_USER: farkki
      POSTGRES_PASSWORD: farkki_dev_password
      POSTGRES_DB: farkki_ai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - omeia-pg-data:/var/lib/postgresql/data
      - ../../sql:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farkki -d farkki_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true

  qdrant:
    image: qdrant/qdrant:latest
    container_name: omeia-qdrant
    networks: [omeia-internal]
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - omeia-qdrant-data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  ollama:
    image: ollama/ollama:latest
    container_name: omeia-ollama
    networks: [omeia-internal]
    expose:
      - "11434"
    volumes:
      - omeia-ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  ollama-proxy:
    image: caddy:2-alpine
    container_name: omeia-ollama-proxy
    networks: [omeia-internal]
    ports:
      - "127.0.0.1:11434:11434"
    env_file:
      - ../../config/env/.env
    environment:
      OLLAMA_INTERNAL_TOKEN: ${OLLAMA_INTERNAL_TOKEN:-}
    volumes:
      - ../../config/env/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /config
      - /data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:11434/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy-platform:
    profiles: [platform]
    image: caddy:2-alpine
    container_name: omeia-caddy-platform
    networks: [omeia-internal]
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ../../config/env/caddy/Caddyfile.platform:/etc/caddy/Caddyfile:ro
      - ../../web/dist:/srv/frontend:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /config
      - /data
    security_opt:
      - no-new-privileges:true

  imaging-worker:
    profiles: [imaging]
    build:
      context: ../..
      dockerfile: infra/docker/imaging-worker/Dockerfile
      args:
        IMAGING_INCLUDE_NAPARI: ${IMAGING_INCLUDE_NAPARI:-1}
    container_name: omeia-imaging-worker
    networks: [omeia-internal]
    volumes:
      - ${DATABASE_ROOT:-../../OMEIA-database}:/data/database:ro
    environment:
      DATABASE_ROOT: /data/database
    restart: "no"
    healthcheck:
      test: ["CMD", "python", "/opt/omeia/healthcheck.py"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

volumes:
  omeia-pg-data:
  omeia-qdrant-data:
  omeia-ollama-data:
