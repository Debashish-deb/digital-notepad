# Core imaging stack — conda-forge packages available on linux-aarch64 and linux-amd64.
name: omeia-imaging
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - tifffile
  - imagecodecs
  - numpy
  - pillow
  - zarr
  - fsspec
  - dask
  - scikit-image
  - pyvips
  - openslide-python
  - aicsimageio
  - napari
  - pyqt
  - pip:
    - deeptile>=2.0
    - fastapi
    - uvicorn
    - httpx
