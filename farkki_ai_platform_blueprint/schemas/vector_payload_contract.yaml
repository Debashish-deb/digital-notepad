required_fields:
  schema_version: integer
  source_type: string
  source_uuid: string
  chunk_id: string_or_null
  title: string
  text_preview: string
  sensitivity_level: enum(public, internal, restricted, confidential, direct_identifier)
  allowed_project_codes: list[string]
  contains_patient_level_data: boolean
  contains_direct_identifier: boolean
  embedding_model: string
  embedding_dimension: integer
  created_at: timestamp

recommended_fields:
  project_code: string_or_null
  cohort_code: string_or_null
  sample_code: string_or_null
  patient_code: string_or_null_deidentified_only
  modality: list[string]
  entities:
    markers: list[string]
    cell_types: list[string]
    diseases: list[string]
    drugs: list[string]
    pathways: list[string]
    clinical_variables: list[string]
  source_file_id: string_or_null
  document_id: string_or_null
  document_version_id: string_or_null
  section_path: string_or_null
  chunk_index: integer_or_null
  sha256: string_or_null
  status: enum(active, deprecated, revoked, archived)

rules:
  - "contains_direct_identifier must always be false for Qdrant payloads in normal research mode."
  - "patient_code may only be pseudonymized/de-identified."
  - "allowed_project_codes must not be empty for internal/restricted/confidential content."
  - "sensitivity_level must be indexed for filtered retrieval."
  - "source_uuid or chunk_id must resolve back to PostgreSQL metadata."
