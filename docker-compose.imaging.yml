# Standalone imaging worker — does NOT require imaging-worker in docker-compose.yml.
#
#   docker compose -f docker-compose.imaging.yml build
#   docker compose -f docker-compose.imaging.yml run --rm imaging-worker
#
# Optional: mount your database mirror
#   DATABASE_ROOT=/path/to/OMEIA-database docker compose -f docker-compose.imaging.yml run --rm imaging-worker

networks:
  omeia-imaging:
    driver: bridge

services:
  imaging-worker:
    build:
      context: .
      dockerfile: docker/imaging-worker/Dockerfile
      args:
        IMAGING_INCLUDE_NAPARI: ${IMAGING_INCLUDE_NAPARI:-1}
    image: omeia-imaging-worker:latest
    container_name: omeia-imaging-worker
    networks: [omeia-imaging]
    volumes:
      - ${DATABASE_ROOT:-../OMEIA-database}:/data/database:ro
    environment:
      DATABASE_ROOT: /data/database
    restart: "no"
    healthcheck:
      test: ["CMD", "python", "/opt/omeia/healthcheck.py"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
