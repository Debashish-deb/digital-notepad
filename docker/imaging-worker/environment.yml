# Legacy single-file env — use environment-core.yml + environment-cycif-amd64.yml instead.
# Kept for reference; Dockerfile uses the split files for aarch64/amd64 compatibility.
name: omeia-imaging
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - tifffile
  - imagecodecs
  - numpy
  - pillow
  - zarr
  - fsspec
  - dask
  - scikit-image
  - pyvips
  - openslide-python
  - aicsimageio
  # amd64 only — see environment-cycif-amd64.yml
  # - bioformats2raw
  # - raw2ometiff
  # - ashlar
  - napari
  - pyqt
  - pip:
    - deeptile>=2.0
    - fastapi
    - uvicorn
    - httpx
